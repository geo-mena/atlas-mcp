server {
    listen 80;
    server_name _;
    # nginx and PHP-FPM share the same volume mount (/var/www/html → ./php).
    # Document root is the public/ subdirectory; PHP-FPM resolves SCRIPT_FILENAME
    # against the same mount so require_once paths walk up to ../src/ correctly.
    root /var/www/html/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
