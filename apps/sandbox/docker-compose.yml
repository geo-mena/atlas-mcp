services:
  nginx:
    image: nginx:1.27.2-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./php/public:/var/www/html:ro
    depends_on:
      - php

  php:
    build:
      context: .
      dockerfile: Dockerfile.php
    volumes:
      - ./php:/var/www/html:rw
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: atlas
      DB_PASSWORD: atlas
      DB_NAME: atlas_sandbox
      SENIAT_BASE_URL: http://seniat-mock:3001
    depends_on:
      - mysql
      - seniat-mock

  mysql:
    image: mysql:8.4.2
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: atlas_sandbox
      MYSQL_USER: atlas
      MYSQL_PASSWORD: atlas
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "3306:3306"

  seniat-mock:
    build:
      context: ./seniat-mock
      dockerfile: ../Dockerfile.seniat-mock
    ports:
      - "8081:3001"
    environment:
      PORT: 3001
      FLAKE_EVERY_N: 0

volumes:
  mysql-data:
